<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potential Website Layout</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="grid-container">
      <!-- Header -->
      <header class="header">
        <div class="logo">POTENTIAL</div>
        <nav class="nav">
          <a href="#">Technology</a>
          <a href="#">About</a>
          <a href="#">News</a>
          <a href="#">Contact</a>
        </nav>
      </header>
  
      <!-- Main Content -->
      <main class="main">
        <div class="tagline">
          <h1>For what comes next.</h1>
          <p>Technology that drives adventure.</p>
        </div>
        <div class="buttons">
          <button>Terrain Intelligence</button>
          <button>Contact</button>
        </div>
      </main>
  
      <!-- Full-screen Video -->
      <video autoplay muted loop id="myVideo" class=""embed-responsive-item>
        <source src="assets/Cinematic Car Service Video - by STILKRAFT Film.mp4" type="video/mp4">
      </video>
    </div>
      <!-- Image Section -->
       <section class="second-page">
          <div class="second-page-top">
            <p>We're using cameras and advanced software to rethink how vehicles interact with complex terrain, both off-road and on it.</p>
           </div>
              <div class="second-page-bottom">
                <div class="second-page-bottom-left">
                      
                      <div class="img-container">
                        <h1>FOR DRIVERS</h1>
                        <img src="./assets/Untitled.jpg" alt="hello"/>
                      </div>

                </div>
                <div class="second-page-bottom-right">
              Hi
             </div>
          </div>
          
    </section>
    
  </body>
</html>
